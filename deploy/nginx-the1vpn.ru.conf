server {
    listen 80;
    listen [::]:80;
    server_name the1vpn.ru www.the1vpn.ru;

    return 301 https://the1vpn.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.the1vpn.ru;

    ssl_certificate /etc/letsencrypt/live/the1vpn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the1vpn.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://the1vpn.ru$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name the1vpn.ru;
    client_max_body_size 8m;

    ssl_certificate /etc/letsencrypt/live/the1vpn.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the1vpn.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /_next/static/ {
        root /var/www/site1vpn/runtime/public-home;
        try_files $uri @site1vpn;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_buffering on;
    }

    location @site1vpn {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;
        proxy_buffering on;
    }
}
